<h1>Dragonball Super Page</h1>

<section class="row">
    <div class = "col-12 col-sm-6">
        <h3>Agregar: {{name()}}</h3>

        <input 
            type="text" 
            class="form-control" 
            placeholder="Nombre del personaje"
            [value] = "name()"
            (input)="name.set(txtName.value)"
            (change)="name.set(txtName.value)"
            #txtName
            />

        <h3> {{power()}} </h3>
        <input 
            type="number" 
            class="form-control mt-2" 
            placeholder= "Introduzca el poder" 

            [value] = "power()"
            (input)="power.set(txtPower.valueAsNumber)"
            (change)="power.set(txtPower.valueAsNumber)"
            #txtPower
            />

        <button (click)="addCharacter()" class="mt-2 btn btn-primary">Agregar</button>
    </div>

    <div class="col-12 col-sm-6">
        <h3>Listado Fuertes</h3>
        <ul>

            @for (character of characteres(); track character.id; let idx= $index) {

                @if(character.power > 500)
                {
                    <li>
                        <span>{{ idx + 1 }} - {{character.name}}</span>

                        <strong 
                            [class.text-danger]="character.power > 9000"
                            [class.text-info]="character.power < 9000"
                            > 
                            <!-- [ngClass]="powerClasses" -->
                        ({{character.power}}) </strong>
                    </li>
                }
                @else {
                    <li>   <strong> Aqui no hay nadie </strong> </li>
                }
                
            }

        </ul>

    </div>
</section>
