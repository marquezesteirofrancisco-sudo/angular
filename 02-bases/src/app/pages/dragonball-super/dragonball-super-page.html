<h1>Dragonball Super Page</h1>

<section class="row">
    <div class = "col-12 col-sm-6">
       <dragonball-character-add 
        (newCharacter)="dragonballService.addCharacter($event)"
       />
    </div>

    <div class="col-12 col-sm-6">
        <dragonball-character-list 
            listadoPersonajesParam = "Listado de Personajes Fuertes"
            [charactersParam]="dragonballService.characters()" 
        />
    </div>
</section>
