<h1>Dragonball Super Page</h1>

<section class="row">
    <div class = "col-12 col-sm-6">
        <h3>Agregar: {{name()}}</h3>

        <input 
            type="text" 
            class="form-control" 
            placeholder="Nombre del personaje"
            [value] = "name()"
            (input)="name.set(txtName.value)"
            (change)="name.set(txtName.value)"
            #txtName
            />

        <h3> {{power()}} </h3>
        <input 
            type="number" 
            class="form-control mt-2" 
            placeholder= "Introduzca el poder" 

            [value] = "power()"
            (input)="power.set(txtPower.valueAsNumber)"
            (change)="power.set(txtPower.valueAsNumber)"
            #txtPower
            />

        <button (click)="addCharacter()" class="mt-2 btn btn-primary">Agregar</button>
    </div>

    <div class="col-12 col-sm-6">
        <dragonball-character-list [charactersParam]="characters()" />
    </div>
</section>
