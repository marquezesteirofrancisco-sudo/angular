<h1>Counter {{ counter }}</h1> 
<h1>Counter Signal {{ counterSignal() }}</h1> 
<h2>Counter Component Page</h2>

<button class="btn-counter" (click) ="increaseBy(1)">+1</button>
<button class="btn-counter" (click) ="increaseBy(-1)">-1</button>
<button class="btn-counter" (click) ="resetCounter(0)">Reset</button>
